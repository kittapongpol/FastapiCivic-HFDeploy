name: test-build-deploy

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: pytest -q

  docker:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t civic-gen-classifier:ci .

  deploy-huggingface:
    needs: [test, docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Push runtime files to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
        run: |
          test -n "$HF_TOKEN"
          test -n "$HF_USERNAME"
          test -n "$HF_SPACE_NAME"
          git config --global user.email "actions@github.com"
          git config --global user.name "github-actions"
          git clone "https://$HF_USERNAME:$HF_TOKEN@huggingface.co/spaces/$HF_USERNAME/$HF_SPACE_NAME" /tmp/hf-deploy

          rm -rf /tmp/hf-deploy/app /tmp/hf-deploy/models
          rm -f /tmp/hf-deploy/Dockerfile /tmp/hf-deploy/requirements.txt /tmp/hf-deploy/README.md
          mkdir -p /tmp/hf-deploy
          cp -R app /tmp/hf-deploy/app
          cp -R models /tmp/hf-deploy/models
          cp Dockerfile requirements.txt README.md /tmp/hf-deploy/

          cd /tmp/hf-deploy
          git add .
          git commit -m "Deploy Civic generation classifier" || echo "No changes to deploy"
          git push
